name: Community entry proof

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  community-entry-proof:
    name: Community entry proof pack
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Generate community entry proof pack
        run: python scripts/run_community_entry_proof.py

      - name: Upload community entry proof pack
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: community-entry-proof-pack
          path: results/community-entry-proof
          if-no-files-found: error
