name: OSS readiness proof

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  oss-readiness-proof:
    name: OSS readiness proof pack
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Generate OSS readiness proof pack
        run: python scripts/run_oss_readiness_proof.py

      - name: Upload OSS readiness proof pack
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oss-readiness-proof-pack
          path: results/oss-readiness-proof
          if-no-files-found: error
