defaults:
  endpoint: http://127.0.0.1:8000/v1/chat/completions
  framework: vllm
  model: dry-run-model
  repeats: 2
  timeout_seconds: 60

profiles:
  - name: chat_short
    description: Short assistant-style interaction.
    prompt_tokens: 128
    output_tokens: 128
    batch_size: 1
    concurrency: 1

  - name: summarization_medium
    description: Medium input with shorter generated summary.
    prompt_tokens: 1024
    output_tokens: 256
    batch_size: 1
    concurrency: 1

  - name: code_generation
    description: Moderate prompt with long generated code output.
    prompt_tokens: 512
    output_tokens: 1024
    batch_size: 1
    concurrency: 1

  - name: long_context_qa
    description: Long-context prompt with concise answer.
    prompt_tokens: 4096
    output_tokens: 128
    batch_size: 1
    concurrency: 1

  - name: burst_chat_concurrency
    description: Small chat requests under concurrent load.
    prompt_tokens: 128
    output_tokens: 128
    batch_size: 1
    concurrency: 4
